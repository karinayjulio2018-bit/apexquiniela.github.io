*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

/* ── BG atmosférico igual al landing ── */

(function(){

var chartInst=null, historialGlobal=[], lideres={}, _primeraCarga=true, _intervalId=null;

google.script.run
.withSuccessHandler(renderTodo)

document.getElementById('mainContent').innerHTML=

function renderTodo(data){

return;

var jugadores=data.jugadores||[], partidos=data.partidos||[], matriz=data.matriz||[];

var numParts=partidos.length;
var resueltos=partidos.filter(function(p){return p.resultado;}).length;

lideres={};
if(maxAciertos>0) jugadores.forEach(function(j){if(j.aciertos===maxAciertos) lideres[j.alias]=true;});

var scrollAntes=window.scrollY||window.pageYOffset;

function _actualizarDOM(jugadores,partidos,matriz,numParts,resueltos,data){

function _precalcularVotos(partidos,matriz){
return partidos.map(function(p,pi){
var vL=0,vE=0,vV=0,cL=[],cE=[],cV=[];
matriz.forEach(function(m){
var pr=(m.pronos[pi]||'').trim().toUpperCase();
if(!pr||pr==='\uD83D\uDD12') return;
var ops=pr.split(',').map(function(x){return x.trim();});
if(ops.indexOf('LOCAL')!=-1){vL++;cL.push(m.alias);}
if(ops.indexOf('EMPATE')!=-1){vE++;cE.push(m.alias);}
if(ops.indexOf('VISITANTE')!=-1){vV++;cV.push(m.alias);}
});
var tot=vL+vE+vV;
var pL=tot>0?Math.round(vL/tot*100):0;
var pE=tot>0?Math.round(vE/tot*100):0;
var pV=tot>0?(100-pL-pE):0;
return{vL:vL,vE:vE,vV:vV,cL:cL,cE:cE,cV:cV,tot:tot,pL:pL,pE:pE,pV:pV};
});
}

function _htmlStats(jugadores,partidos,resueltos,data){
var numParts=partidos.length, lider=jugadores[0]||{};
var bolsa=data.bolsaReal||data.pozo||0;

mkStat(jugadores.length,'Quinielas','green')+
mkStat('$'+bolsa.toLocaleString('es-MX'),'💰 Bolsa','gold')+
mkStat(resueltos+'/'+numParts,'Partidos','silver')+
mkStat(liderLabel,nL>1?'1er Lugar':'Líder','gold')+
'</div>';

function _htmlPodio(jugadores,numParts){

return '<div class="sec-title fade-in">🏆 Podio</div><div class="podio fade-in">'+
(jugadores[1]?mkPodio(jugadores[1],2,numParts):'')+
(jugadores[0]?mkPodio(jugadores[0],1,numParts):'')+
(jugadores[2]?mkPodio(jugadores[2],3,numParts):'')+
'</div>';

function _htmlRanking(jugadores,resueltos){

var pct=resueltos>0?Math.round((j.aciertos/resueltos)*100):0;

if(j.alias&&j.alias!==j.nombre) html+='<div class="alias-sub">@'+escH(j.alias)+'</div>';

html+='<td class="pts-cell">'+j.aciertos+'</td>';

function _htmlPartidos(partidos,votos){

var cls=!r?'res-pend':r==='LOCAL'?'res-local':r==='EMPATE'?'res-empate':'res-visita';

var v=votos[i];

else if(v.vL===0||v.vV===0) frase='¡Todos van por el mismo lado! ¿Te diferencias? 😈';
else if(v.pL>=70) frase=escH(p.local)+' es el favorito del grupo 🐑';
else if(v.pV>=70) frase='La mayoría apuesta por '+escH(p.visitante)+' 🦁';
else if(Math.abs(v.pL-v.pV)<=15) frase='El grupo está dividido. ¡Momento de brillar! ⚡';

else frase='Sin consenso. Tu pronóstico puede marcar la diferencia 🎯';
var mkC=function(arr,t){return arr.map(function(a){return '<span class="hover-chip '+t+'">'+escH(a)+'</span>';}).join('');};
html+='<div class="partido-card '+cls+'">';
html+='<div class="partido-num">Partido '+(i+1)+'</div>';
html+='<div class="partido-equipos">'+escH(p.local)+' <span class="partido-vs">vs</span> '+escH(p.visitante)+'</div>';
if(p.fecha) html+='<div class="partido-fecha">📅 '+escH(p.fecha)+'</div>';
if(p.transmision) html+='<div class="partido-fecha">📺 '+escH(p.transmision)+'</div>';
html+='<div class="partido-resultado">'+texto+'</div>';
html+='<div class="partido-hover-panel"><div class="hover-votos-label">👥 ¿Qué dicen tus rivales?</div>';
if(v.tot===0){ html+='<div style="font-size:.73rem;color:var(--muted);padding:4px 0">Sin pronósticos aún</div>'; }
else{
html+='<div class="hover-voto-row"><span class="hover-voto-tipo">🏠 Local</span><div class="hover-barra-wrap"><div class="hover-barra bv-local" style="width:'+v.pL+'%"></div></div><span class="hover-pct bv-local">'+v.pL+'%</span></div>';

html+='<div class="hover-voto-row"><span class="hover-voto-tipo">✈️ Visita</span><div class="hover-barra-wrap"><div class="hover-barra bv-visita" style="width:'+v.pV+'%"></div></div><span class="hover-pct bv-visita">'+v.pV+'%</span></div>';
html+='<div class="hover-chips">'+mkC(v.cL,'bv-local')+mkC(v.cE,'bv-empate')+mkC(v.cV,'bv-visita')+'</div>';
}
html+='<div class="hover-frase">'+frase+'</div></div></div>';
});

function _htmlBtnHistorial(){

return '<button class="btn-historial fade-in" onclick="verHistorial()">'+
'<span class="btn-hist-ico">🏆</span>'+
'<span class="btn-hist-txt"><span class="btn-hist-title">Ver Historial de Temporada</span>'+

function _htmlMatriz(jugadores,partidos,matriz){
if(!matriz.length||!partidos.length) return '';
var ju=_jugUnicos(jugadores,matriz);
var tituloMtz=jugadores.length>30?'🎯 Pronósticos — Top 30 de '+jugadores.length+' jugadores':'🎯 Pronósticos — Todos los Jugadores';
var html='<div class="sec-title fade-in">'+tituloMtz+'</div>';

html+='</div>';

}

function _jugUnicos(jugadores,matriz){
var ju=[],visto={},limite=Math.min(jugadores.length,30);
for(var ji=0;ji<limite;ji++){
var j=jugadores[ji];
if(visto[j.alias]) continue; visto[j.alias]=true;
var m=null;
for(var mi=0;mi<matriz.length;mi++){if(matriz[mi].alias===j.alias){m=matriz[mi];break;}}
ju.push({alias:j.alias,aciertos:j.aciertos,pronos:m?m.pronos:[]});
}
return ju;
}

function _mtzHead(ju){
var html='<thead><tr><th class="mtz-th-partido">Partido</th>';
ju.forEach(function(j){
var eL=!!lideres[j.alias];
html+='<th class="'+(eL?'mtz-th-jugador mtz-th-lider':'mtz-th-jugador')+'" title="'+escH(j.alias||'—')+'">';
if(eL) html+='<span class="mtz-corona">👑</span>';
html+='<span class="'+(eL?'mtz-alias mtz-alias-lider':'mtz-alias')+'">'+escH(j.alias||'—')+'</span>';
html+='<span class="'+(eL?'mtz-pts mtz-pts-lider':'mtz-pts')+'">'+j.aciertos+'</span></th>';
});
return html+'</tr></thead>';
}

function _mtzBody(ju,partidos){
var html='<tbody>';
partidos.forEach(function(p,pi){
var res=p.resultado;
var resLbl=!res?'?':res==='LOCAL'?'L':res==='EMPATE'?'E':'V';
var resCls=!res?'res-pend':res==='LOCAL'?'res-L':res==='EMPATE'?'res-E':'res-V';
html+='<tr><td class="mtz-td-partido"><span class="mtz-p-num">P'+(pi+1)+'</span>';
html+=escH(p.local.substring(0,7))+' <span class="mtz-p-equip">vs</span> '+escH(p.visitante.substring(0,7));
if(res) html+=' <span class="mtz-res-badge '+resCls+'">'+resLbl+'</span>';
html+='</td>';
ju.forEach(function(j){ html+=_mtzCelda(j,pi,res); });
html+='</tr>';
});
return html+'</tbody>';
}

function _mtzCelda(j,pi,res){
var eL=!!lideres[j.alias], pr=j.pronos[pi]||'';
var ops=(pr&&pr!=='🔒')?pr.split(',').map(function(x){return x.trim();}).filter(Boolean):[];
var le=eL?' mtz-cel-lider':'';
if(pr==='🔒') return '<td class="mtz-cel mtz-cel-pend'+le+'">🔒</td>';
if(!ops.length) return '<td class="mtz-cel mtz-cel-pend'+le+'">—</td>';
if(ops.length===1){
var lbl=ops[0]==='LOCAL'?'L':ops[0]==='EMPATE'?'E':ops[0]==='VISITANTE'?'V':'—';
var c2=ops[0]==='LOCAL'?'mtz-cel-L':ops[0]==='EMPATE'?'mtz-cel-E':ops[0]==='VISITANTE'?'mtz-cel-V':'mtz-cel-pend';
var ex=res?(ops[0]===res?' mtz-acierto':' mtz-fallo'):'';
return '<td class="mtz-cel '+c2+ex+le+'">'+lbl+'</td>';
}
var ac=false; if(res){for(var o=0;o<ops.length;o++){if(ops[o]===res){ac=true;break;}}}
var cc=res?(ac?' mtz-combo-ok mtz-acierto':' mtz-combo-no'):'';
var lbls=ops.map(function(op){return op==='LOCAL'?'L':op==='EMPATE'?'E':op==='VISITANTE'?'V':op;}).join('/');
return '<td class="mtz-combo'+cc+le+'">'+lbls+'<br><small>'+(ops.length===2?'D':'T')+'</small></td>';
}

function _mtzFoot(ju){
var html='<tfoot><tr><td class="mtz-tfoot-label">✓ ACIERTOS</td>';
ju.forEach(function(j){
var eL=!!lideres[j.alias];
html+='<td class="mtz-tfoot-pts'+(eL?' tfoot-lider':'')+'">'+(eL?'👑 ':'')+j.aciertos+'</td>';
});
return html+'</tr></tfoot>';
}

function _actualizarMatriz(jugadores,partidos,matriz){
var mtz=document.querySelector('.mtz-table'); if(!mtz) return;
var ju=_jugUnicos(jugadores,matriz);
var th=mtz.querySelector('thead'); if(th) th.outerHTML=_mtzHead(ju);
var tb=mtz.querySelector('tbody'); if(tb) tb.outerHTML=_mtzBody(ju,partidos);
var tf=mtz.querySelector('tfoot'); if(tf) tf.outerHTML=_mtzFoot(ju);
}

function _dibujarGrafica(jugadores,totalParts){
var canvas=document.getElementById('chartCanvas'); if(!canvas) return;
var top=jugadores.slice(0,20);
var labels=top.map(function(j){return j.alias||j.nombre;});
var datos=top.map(function(j){return j.aciertos;});
var max=Math.max.apply(null,datos.concat([0]));
var cols=datos.map(function(v){return v===max&&v>0?'rgba(255,216,77,.85)':'rgba(0,255,135,.45)';});
var bords=datos.map(function(v){return v===max&&v>0?'#FFD84D':'#00FF87';});
if(chartInst&&chartInst.canvas){
chartInst.data.labels=labels;
chartInst.data.datasets[0].data=datos;
chartInst.data.datasets[0].backgroundColor=cols;
chartInst.data.datasets[0].borderColor=bords;
chartInst.options.scales.y.max=totalParts||15;
chartInst.update('none'); return;
}
chartInst=new Chart(canvas,{
type:'bar',
data:{labels:labels,datasets:[{data:datos,backgroundColor:cols,borderColor:bords,borderWidth:1.5,borderRadius:4}]},
options:{
responsive:true,maintainAspectRatio:false,
plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){
var pct=totalParts>0?Math.round((ctx.raw/totalParts)*100):0;
return ctx.raw+' aciertos ('+pct+'%)';
}}}},
scales:{
x:{ticks:{color:'var(--muted2)',font:{family:'Outfit',size:11},maxRotation:45},grid:{color:'rgba(255,255,255,.03)'}},
y:{beginAtZero:true,max:totalParts||15,ticks:{color:'var(--muted2)',stepSize:1,font:{size:11}},grid:{color:'rgba(255,255,255,.04)'}}
}
}
});
}

// Historial
function verHistorial(){
document.getElementById('mainContent').style.display='none';
document.getElementById('histScreen').style.display='block';
document.querySelector('footer').style.display='none';
window.scrollTo(0,0);
if(!historialGlobal.length){document.getElementById('histContenido').innerHTML='<p style="color:var(--muted);padding:30px;text-align:center;">No hay historial disponible.</p>';return;}
var html='<div class="tabla-wrap"><table><thead><tr><th>#</th><th>Jugador</th>';
historialGlobal[0].jornadas.forEach(function(j){html+='<th>'+escH(j.nombre)+'</th>';});
html+='<th>Total</th></tr></thead><tbody>';
historialGlobal.forEach(function(j,i){
html+='<tr class="'+(i<3?'row-lider':'')+'"><td><span class="pos-badge '+(i<3?'pos-'+(i+1):'pos-n')+'">'+(i+1)+'</span></td>';
html+='<td class="nombre-cell">'+escH(j.alias)+'</td>';
j.jornadas.forEach(function(jr){html+='<td class="pct-cell">'+(jr.pts!==null?jr.pts:'—')+'</td>';});
html+='<td class="pts-cell">'+j.total+'</td></tr>';
});
html+='</tbody></table></div>';
document.getElementById('histContenido').innerHTML=html;
}
function regresarRanking(){
document.getElementById('histScreen').style.display='none';
document.getElementById('mainContent').style.display='block';
document.querySelector('footer').style.display='';
window.scrollTo(0,0);
}

// Utilidades
function mkStat(val,lbl,cls){return '<div class="stat-card '+(cls||'')+'"><div class="stat-val">'+val+'</div><div class="stat-lbl">'+lbl+'</div></div>';}

function mkPodio(j,pos,totalParts){
var eL=pos>1&&lideres&&!!lideres[j.alias];
var medals=['','🥇','🥈','🥉'],classes=['','p1','p2','p3'],ptsClass=['','gold','silver','bronze'],labels=['','1er Lugar','2do Lugar','3er Lugar'];
var pct=totalParts>0?Math.round((j.aciertos/totalParts)*100):0;
var dest=pos===1||eL;
return '<div class="podio-item '+classes[pos]+(dest&&pos>1?' podio-glow-gold':'')+'">'+(dest?'<div class="podio-corona">👑</div>':'')+
'<div class="podio-medal">'+medals[pos]+'</div><div class="podio-pos">'+(eL&&pos>1?'🏆 EMPATE':labels[pos])+'</div>'+
'<div class="podio-nombre" style="'+(dest&&pos>1?'color:var(--oro);':'')+'">'+escH(j.nombre||j.alias)+'</div>'+
'<div class="podio-pts '+ptsClass[pos]+'" style="'+(dest&&pos>1?'color:var(--oro);text-shadow:0 0 14px rgba(255,216,77,.7);':'')+'">'+j.aciertos+'</div>'+
'<div class="podio-pct">'+pct+'% efectividad</div></div>';
}

function escH(str){if(!str)return '';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Tap mobile panel votos
document.addEventListener('click',function(e){
var card=e.target.closest('.partido-card');
if(!card){document.querySelectorAll('.partido-card.panel-abierto').forEach(function(c){c.classList.remove('panel-abierto');});return;}
if(window.matchMedia('(hover: none)').matches){
var ab=card.classList.contains('panel-abierto');
document.querySelectorAll('.partido-card.panel-abierto').forEach(function(c){c.classList.remove('panel-abierto');});
if(!ab){card.classList.add('panel-abierto');e.stopPropagation();}
}
});
</script>
